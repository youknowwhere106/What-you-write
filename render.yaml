services:
  # ── Web Service (FastAPI) ──────────────────────────────────────────────────
  - type: web
    name: what-you-write-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: MONGODB_URL
        sync: false          # set in Render dashboard
      - key: DATABASE_NAME
        value: whatyouwrite
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "1440"
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: what-you-write-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: what-you-write-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: what-you-write-redis
          type: redis
          property: connectionString
      - key: CORS_ORIGINS
        sync: false          # set to your Vercel frontend URL
      - key: EMBEDDING_PROVIDER
        value: sentence-transformers
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

  # ── Celery Worker ──────────────────────────────────────────────────────────
  - type: worker
    name: what-you-write-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    startCommand: celery -A app.workers.celery_app worker --loglevel=info -Q ai_processing --concurrency=2
    envVars:
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_NAME
        value: whatyouwrite
      - key: JWT_SECRET_KEY
        sync: false
      - key: JWT_ALGORITHM
        value: HS256
      - key: GEMINI_API_KEY
        sync: false
      - key: REDIS_URL
        fromService:
          name: what-you-write-redis
          type: redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          name: what-you-write-redis
          type: redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          name: what-you-write-redis
          type: redis
          property: connectionString
      - key: EMBEDDING_PROVIDER
        value: sentence-transformers
      - key: EMBEDDING_MODEL
        value: all-MiniLM-L6-v2

  # ── Redis ──────────────────────────────────────────────────────────────────
  - type: redis
    name: what-you-write-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
